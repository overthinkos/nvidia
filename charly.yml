#  overthinkos/nvidia — the NVIDIA GPU base image family, split out of the main
#  opencharly repo (2026-05). Mounted as a git submodule at image/nvidia.
#
#  SINGLE-FILE config: the two GPU base images (nvidia + python-ml) are inlined
#  here. This repo VENDORS NOTHING — the GPU runtime LAYERS (nvidia, cuda,
#  python-ml, llama-cpp) are SHARED infrastructure consumed across many families
#  (versa, immich-ml, jupyter-ml, comfyui, unsloth, whisper, marimo) AND by the
#  arch/cachyos/fedora/bootc base submodules, so by the shared-layer rule they
#  STAY in the main repo and are reached here by `@github.com/...` ref. The
#  shared build-config (distro/builder/init) arrives via a flat `import:`, and
#  the main repo's Fedora base stack (charly.fedora-nonfree) arrives via the
#  namespaced `charly` import.
#
#  This is a MUTUAL import (like cachyos): main consumes the `nvidia` image as
#  `base: nvidia.nvidia` (comfyui / jupyter-ml / jupyter-ml-notebook / ollama /
#  unsloth-studio), and this repo consumes main as
#  `charly.fedora-nonfree` + `charly.fedora-builder`. The cycle is broken at load.
#
#  import: has two shapes —
#    * flat string  → build.yml (shared distro/builder/init vocabulary), merged
#      into this repo's root namespace. Carries distro.fedora + the rpm format
#      template.
#    * `charly: <ref>`  → the main opencharly repo mounted under the `charly` namespace,
#      so the Fedora base stack (charly.fedora-nonfree) + the builder
#      (charly.fedora-builder) resolve. Builder maps do NOT cross a namespace
#      boundary, so python-ml declares its own explicit `builder:` map routing
#      pixi/npm/cargo to charly.fedora-builder.
#
#  PINS — match the ecosystem exactly (the global resolver forbids one layer at
#  two tags): build.yml, every layer ref, and the `charly` namespace import all
#  pin to the shared ecosystem tag v2026.159.1101 (the same tag the other image
#  submodules reconcile to). `charly box reconcile --remote` re-aligns them when
#  the ecosystem advances.
#
#  Directly buildable: `charly box build nvidia` (the build verb defaults to this
#  charly.yml). From the parent repo: `charly -C image/nvidia image build nvidia`,
#  or anywhere: `charly --repo overthinkos/nvidia image build nvidia`.
version: 2026.159.1912
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - rpm
    merge:
        auto: false
        max_mb: 128
import:
    # Shared build-config vocabulary (distro/builder/init) — flat root import.
    # Carries distro.fedora + the rpm format template.
    - '@github.com/overthinkos/overthink/build.yml:v2026.160.0856'
    # Main repo entities under the `charly` namespace — charly.fedora-nonfree (the
    # nvidia image's base) + charly.fedora-builder (python-ml's pixi/npm/cargo
    # builder). Mutual import with main (main mounts this repo under `nvidia`);
    # cycle-broken at load.
    - charly: '@github.com/overthinkos/overthink:v2026.160.0856'
    - box.yml
    - pod.yml
    - k8s.yml
