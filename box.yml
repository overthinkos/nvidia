#  Per-kind file for image entries. Sibling of charly.yml — imported via
#  charly.yml's `import:` list. The schema kind discriminator is
#  `kind: image` for kind-keyed entries; root-shape map is `image:` (this file).
#  2026-05 kind-files cutover.
version: 2026.159.1912
box:
    nvidia:
        # GPU base: Fedora + RPM Fusion (charly.fedora-nonfree) + the GPU runtime
        # (nvidia layer: driver libs + nvidia-container-toolkit/CDI) + the CUDA
        # toolkit (cuda layer: nvcc/cuDNN/onnxruntime). No builder map: none of
        # these layers carry a pixi/npm/cargo manifest.
        base: charly.fedora-nonfree
        platform:
            - linux/amd64
        candy:
            - '@github.com/overthinkos/overthink/candy/agent-forwarding:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/cuda:v2026.160.0856'
    python-ml:
        # GPU-accelerated Python ML environment (PyTorch / transformers / vLLM /
        # llama.cpp) on the local nvidia base. Disabled by default (heavy GPU
        # image). The python-ml layer owns the pixi.toml, so an explicit builder
        # map is required (builder maps do not cross the `charly` namespace boundary).
        enabled: false
        base: nvidia
        builder:
            pixi: charly.fedora-builder
            npm: charly.fedora-builder
            cargo: charly.fedora-builder
        platform:
            - linux/amd64
        candy:
            - '@github.com/overthinkos/overthink/candy/agent-forwarding:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/python-ml:v2026.160.0856'
